<!-- เนื้อหาของหน้า -->
<div class="page-container">
<table style="width: 100%;background-color:white;">
<tr style="color: black;background-color: green;border-color: black;border: 1px;font-weight: bold ;">
    <td align="center" >
        IT 08-1
    </td>
</tr>
<tr style="color: black;background-color: white;border-color: black;border: 1px;font-weight: bold ;">
  <td>
     <br>&nbsp;
    <button class="append-button"  type="button" [routerLink]="['/question']">เพิ่มข้อสอบ</button> 
    <br>&nbsp;
    <table *ngIf="questions && questions.length > 0" style="width: 500px; table-layout: fixed; border-collapse: collapse;">
      <tr *ngFor="let item of questions; let i = index;">
        <td style="width: 20px;">&nbsp;</td>
        <td style="width: 30px; vertical-align: top;">{{ i + 1 }}</td>
        <!-- เพิ่ม word-break และเปลี่ยนเป็น vertical-align -->
        <td style="width: 250px; vertical-align: top; word-break: break-word; white-space: normal;">
          {{ item.question }}
          <table>
            <tr>
              <td><input type="radio" name="q{{item.id}}"></td>
              <td>{{item.answer1Detail}}</td>
            </tr>
            <tr>
              <td><input type="radio" name="q{{item.id}}"></td>
              <td>{{item.answer2Detail}}</td>
            </tr>
            <tr>
              <td><input type="radio" name="q{{item.id}}"></td>
              <td>{{item.answer3Detail}}</td>
            </tr>
             <tr>
              <td><input type="radio" name="q{{item.id}}"></td>
              <td>{{item.answer4Detail}}</td>
            </tr>           
          </table>
        </td>
        <td style="width: 150px; vertical-align: top;">
          <button class="delete-button" (click)="delete(item.id)">ลบ</button>
        </td>
      </tr>
    </table>
    <!-- เผื่อไว้แสดงตอนกำลังโหลดหรือไม่มีข้อมูล -->
    <div *ngIf="!questions || questions.length === 0">
      กำลังโหลดข้อมูล หรือ ไม่มีคำถามในระบบ...
    </div>
  </td>
</tr>
</table> 
<!-- แปะบรรทัดนี้ไว้บนสุดของไฟล์ HTML เพื่อ Debug ดูค่าจริง -->
<!--
<pre>{{ questions | json }}</pre>
-->
</div>
